# Assertions for: flaky-critical-sprint
# FC-001 qualifies as flaky-critical (unique coverage: SessionStore not covered by any other test).
# FC-002 does NOT qualify — AuthService coverage is shared with FC-001, no unique areas.
# T-003 is a stable must-run.

must_include_headings:
  - "## Optimisation Summary"
  - "## Must-Run"
  - "## Flaky Critical Coverage"
  - "## Should-Run If Time Permits"
  - "## Defer To Overnight Run"
  - "## Retire Candidates"
  - "## Suite Health Summary"
  - "## Warnings"

must_include_labels:
  - "Recommendation Mode:"
  - "Sprint Risk Level:"
  - "Total Must-Run:"
  - "Total Flaky Critical:"
  - "Total Retire Candidates:"
  - "NFR Elevation:"
  - "Budget Overflow:"
  - "Flakiness Tier High:"

must_include_substrings:
  # Sprint risk is high
  - "Sprint Risk Level: high"
  # Exactly 1 flaky-critical test
  - "Total Flaky Critical: 1"
  # FC-001 in flaky-critical section (unique coverage: SessionStore)
  - "FC-001"
  # FC-002 not in flaky-critical (no unique coverage), retires instead
  - "FC-002"
  # Stabilise action present
  - "stabilize or replace"
  # T-003 in must-run (direct coverage, stable)
  - "T-003"

must_not_include_substrings:
  # FC-001 must NOT appear in Retire Candidates (retire format ends with "no unique coverage")
  - "FC-001 session token e2e flaky (flakiness: 0.45, no unique coverage)"
